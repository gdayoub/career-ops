# Portal Scanner Configuration — George Dayoub (Summer 2026 Internships)
# Expanded to 120+ US tech companies with active intern programs.

title_filter:
  positive:
    - "Intern"
    - "Internship"
    - "Co-op"
    - "New Grad"
    - "Entry Level"
    - "Software Engineer"
    - "Software Developer"
    - "Backend Engineer"
    - "Full Stack"
    - "Full-Stack"
    - "Data Science"
    - "Data Scientist"
    - "Data Engineer"
    - "Data Analyst"
    - "ML Engineer"
    - "Machine Learning"
    - "AI Engineer"
    - "AI"
    - "ML"
    - "NLP"
    - "LLM"
    - "GenAI"
    - "MLOps"
    - "Python"
    - "Platform Engineer"
    - "Research Engineer"
    - "Applied Scientist"
  negative:
    - ".NET"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Director"
    - "VP "
    - "Principal"
    - "Staff"
    - "10+ years"
    - "7+ years"
    - "5+ years"
    - "Security Clearance"
  seniority_boost:
    - "Intern"
    - "Internship"
    - "Co-op"
    - "New Grad"
    - "Entry Level"
    - "Junior"

search_queries:
  # ============ ATS Portal Sweeps (Greenhouse, Ashby, Lever) ============
  # These cast a wide net across ALL companies on each platform.

  # -- Greenhouse (biggest ATS for tech) --
  - name: GH — SWE Intern
    query: 'site:job-boards.greenhouse.io "Software Engineer Intern" OR "Software Engineering Intern"'
    enabled: true
  - name: GH — SWE Intern 2026
    query: 'site:job-boards.greenhouse.io "Software Engineering Intern" "Summer 2026"'
    enabled: true
  - name: GH — DS/ML Intern
    query: 'site:job-boards.greenhouse.io "Data Science Intern" OR "Machine Learning Intern" OR "ML Engineer Intern"'
    enabled: true
  - name: GH — AI Intern
    query: 'site:job-boards.greenhouse.io "AI Engineer Intern" OR "AI Intern" OR "GenAI Intern" OR "Applied AI Intern"'
    enabled: true
  - name: GH — Backend Intern
    query: 'site:job-boards.greenhouse.io "Backend Engineer Intern" OR "Backend Intern" OR "Full Stack Intern"'
    enabled: true
  - name: GH — Data Engineer Intern
    query: 'site:job-boards.greenhouse.io "Data Engineer Intern" OR "Data Engineering Intern" OR "Analytics Intern"'
    enabled: true
  - name: GH — Research Intern
    query: 'site:job-boards.greenhouse.io "Research Engineer Intern" OR "Applied Scientist Intern" OR "Research Intern"'
    enabled: true

  # -- Ashby --
  - name: Ashby — SWE Intern
    query: 'site:jobs.ashbyhq.com "Software Engineer Intern" OR "Software Engineering Intern"'
    enabled: true
  - name: Ashby — DS/ML Intern
    query: 'site:jobs.ashbyhq.com "Data Science Intern" OR "ML Intern" OR "Machine Learning Intern"'
    enabled: true
  - name: Ashby — AI Intern
    query: 'site:jobs.ashbyhq.com "AI Engineer Intern" OR "AI Intern" OR "GenAI Intern"'
    enabled: true
  - name: Ashby — Backend/FS Intern
    query: 'site:jobs.ashbyhq.com "Backend Intern" OR "Full Stack Intern" OR "Platform Intern"'
    enabled: true

  # -- Lever --
  - name: Lever — SWE Intern
    query: 'site:jobs.lever.co "Software Engineer Intern" OR "Software Engineering Intern"'
    enabled: true
  - name: Lever — DS/ML Intern
    query: 'site:jobs.lever.co "Data Science Intern" OR "ML Intern" OR "Machine Learning Intern"'
    enabled: true
  - name: Lever — AI/Backend Intern
    query: 'site:jobs.lever.co "AI Intern" OR "Backend Intern" OR "Full Stack Intern"'
    enabled: true

  # -- Workable --
  - name: Workable — Tech Intern
    query: 'site:apply.workable.com "Software Engineer Intern" OR "Data Science Intern" OR "AI Intern"'
    enabled: true

  # ============ Aggregator & Broad Searches ============

  # -- Wellfound (startups) --
  - name: Wellfound — SWE Intern
    query: 'site:wellfound.com "Software Engineer Intern" OR "Software Engineering Intern" 2026'
    enabled: true
  - name: Wellfound — DS/AI Intern
    query: 'site:wellfound.com "Data Science Intern" OR "ML Intern" OR "AI Intern" 2026'
    enabled: true

  # -- LinkedIn (often indexed by Google) --
  - name: LinkedIn — SWE Intern Summer 2026
    query: 'site:linkedin.com/jobs "Software Engineering Intern" "Summer 2026"'
    enabled: true
  - name: LinkedIn — DS/ML Intern Summer 2026
    query: 'site:linkedin.com/jobs "Data Science Intern" OR "Machine Learning Intern" "Summer 2026"'
    enabled: true
  - name: LinkedIn — AI Intern 2026
    query: 'site:linkedin.com/jobs "AI Engineer Intern" OR "AI Intern" "2026"'
    enabled: true

  # -- Indeed --
  - name: Indeed — SWE Intern 2026
    query: 'site:indeed.com "Software Engineering Intern" "Summer 2026"'
    enabled: true
  - name: Indeed — DS/ML Intern 2026
    query: 'site:indeed.com "Data Science Intern" OR "ML Intern" "Summer 2026"'
    enabled: true

  # -- Handshake (college-focused) --
  - name: Handshake — SWE Intern
    query: 'site:joinhandshake.com "Software Engineer Intern" OR "Software Engineering Intern" 2026'
    enabled: true
  - name: Handshake — DS/AI Intern
    query: 'site:joinhandshake.com "Data Science Intern" OR "AI Intern" OR "ML Intern" 2026'
    enabled: true

  # -- Broad cross-portal --
  - name: Summer 2026 — SWE broad
    query: '"Software Engineering Intern" "Summer 2026" python OR typescript'
    enabled: true
  - name: Summer 2026 — AI/ML broad
    query: '"Machine Learning Intern" OR "AI Intern" OR "Data Science Intern" "Summer 2026"'
    enabled: true
  - name: Summer 2026 — Backend broad
    query: '"Backend Engineer Intern" OR "Backend Intern" "Summer 2026" python OR SQL'
    enabled: true
  - name: Summer 2026 — Data Engineer
    query: '"Data Engineer Intern" OR "Data Engineering Intern" "Summer 2026"'
    enabled: true
  - name: Internship aggregator 1
    query: 'summer 2026 software engineering internship AI OR ML OR data science remote OR "United States"'
    enabled: true
  - name: Internship aggregator 2
    query: '"Summer 2026 intern" python AI OR machine learning startup'
    enabled: true

  # -- Company career pages (no ATS, websearch fallback) --
  - name: Google — SWE Intern
    query: 'site:google.com/about/careers "Software Engineering Intern" OR "STEP Intern" 2026'
    enabled: true
  - name: Meta — SWE Intern
    query: 'site:metacareers.com "Software Engineer Intern" OR "Data Science Intern" 2026'
    enabled: true
  - name: Amazon — SWE Intern
    query: 'site:amazon.jobs "Software Development Engineer Intern" OR "Data Science Intern" 2026'
    enabled: true
  - name: Microsoft — SWE Intern
    query: 'site:careers.microsoft.com "Software Engineer Intern" OR "Data Science Intern" 2026'
    enabled: true
  - name: Apple — SWE Intern
    query: 'site:jobs.apple.com "Software Engineer Intern" OR "Machine Learning Intern" OR "AI Intern" 2026'
    enabled: true

